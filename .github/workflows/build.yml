name: Build amnesic-wipe ISO

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # rebuild monthly

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix pacman config (community merged into extra in 2024)
        run: |
          # Remove [community] section from container's pacman.conf
          sed -i '/^\[community\]/,/^Include/d' /etc/pacman.conf
          sed -i 's/^#\(ParallelDownloads\)/\1/' /etc/pacman.conf
          pacman -Syy --noconfirm
      - name: System update & install deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed archiso mkinitcpio
      - name: Build ISO
        run: |
          cd archlive
          mkarchiso -v .
      - name: Rename ISO
        run: |
          mv archlive/out/*.iso archlive/out/amnesic-wipe-$(date +%Y%m%d).iso
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: amnesic-wipe-iso
          path: archlive/out/*.iso
          compression-level: 0
          retention-days: 90
