name: Build ArchNesic ISO

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'    # rebuild monthly

jobs:
  build:
    strategy:
      matrix:
        variant: [standard, secure]
      fail-fast: false
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman & update
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          echo "Server = https://geo.mirror.pkgbuild.com/\$repo/os/\$arch" >> /etc/pacman.d/mirrorlist
          sed -i 's/^#ParallelDownloads/ParallelDownloads/' /etc/pacman.conf
          pacman -Syyu --noconfirm

      - name: Install build deps
        run: |
          pacman -S --noconfirm --needed archiso

      - name: Apply Secure Boot hardening params
        if: matrix.variant == 'secure'
        run: |
          # UEFI entry
          sed -i 's/page_alloc.shuffle=1 randomize_kstack_offset=on \\/page_alloc.shuffle=1 randomize_kstack_offset=on \\\n        lockdown=confidentiality \\\n        module.sig_enforce=1 \\/' \
            archlive/efiboot/loader/entries/archiso-x86_64.conf
          # BIOS entry (syslinux)
          sed -i 's/page_alloc.shuffle=1 randomize_kstack_offset=on \\/page_alloc.shuffle=1 randomize_kstack_offset=on \\\n         lockdown=confidentiality \\\n         module.sig_enforce=1 \\/' \
            archlive/syslinux/archiso_sys.cfg

      - name: Build ISO
        run: |
          cd archlive
          mkarchiso -v .

      - name: Rename ISO
        run: |
          if [ "${{ matrix.variant }}" = "secure" ]; then
            mv archlive/out/*.iso "archlive/out/archnesic-v3-secure-$(date +%Y%m%d).iso"
          else
            mv archlive/out/*.iso "archlive/out/archnesic-v3-$(date +%Y%m%d).iso"
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: archnesic-${{ matrix.variant }}
          path: archlive/out/*.iso
          compression-level: 0
          retention-days: 90

