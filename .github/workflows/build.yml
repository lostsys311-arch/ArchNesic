name: Build ArchNesic ISO

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'   # rebuild monthly

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman & update
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          # Ensure at least one mirror is available in the Docker container
          echo "Server = https://geo.mirror.pkgbuild.com/\$repo/os/\$arch" >> /etc/pacman.d/mirrorlist
          sed -i 's/^#ParallelDownloads/ParallelDownloads/' /etc/pacman.conf
          pacman -Syyu --noconfirm

      - name: Install build deps
        run: |
          pacman -S --noconfirm --needed archiso

      - name: Build ISO
        run: |
          cd archlive
          mkarchiso -v .

      - name: Rename ISO
        run: |
          mv archlive/out/*.iso "archlive/out/archnesic-$(date +%Y%m%d).iso"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: archnesic-iso
          path: archlive/out/*.iso
          compression-level: 0
          retention-days: 90

