# ArchNesic — syslinux boot entries
# vim: set ft=cfg:

LABEL archnesic
  MENU LABEL ArchNesic — Secure Amnesic Linux
  LINUX /%INSTALL_DIR%/boot/vmlinuz-linux-hardened
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/initramfs-linux-hardened.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% \
         toram quiet splash loglevel=3 \
         udev.log_priority=3 systemd.show_status=auto \
         rd.systemd.show_status=auto rd.udev.log_priority=3 \
         mitigations=auto \
         slab_nomerge init_on_alloc=1 init_on_free=1 \
         page_alloc.shuffle=1 randomize_kstack_offset=on \
         spectre_v2=on spec_store_bypass_disable=on \
         tsx=off tsx_async_abort=full,nosmt \
         kvm.nx_huge_pages=force mce=0

LABEL safe
  MENU LABEL ArchNesic — Safe Mode (no toram)
  LINUX /%INSTALL_DIR%/boot/vmlinuz-linux-hardened
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/initramfs-linux-hardened.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% \
         quiet loglevel=3 \
         mitigations=auto \
         slab_nomerge init_on_alloc=1 init_on_free=1 \
         lockdown=confidentiality \
         spectre_v2=on spec_store_bypass_disable=on mce=0

LABEL verbose
  MENU LABEL ArchNesic — Troubleshoot (verbose)
  LINUX /%INSTALL_DIR%/boot/vmlinuz-linux-hardened
  INITRD /%INSTALL_DIR%/boot/intel-ucode.img,/%INSTALL_DIR%/boot/amd-ucode.img,/%INSTALL_DIR%/boot/initramfs-linux-hardened.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% \
         toram loglevel=7 udev.log_priority=7 \
         systemd.log_level=debug rd.systemd.log_level=debug \
         rd.udev.log_priority=7 \
         mitigations=off slab_nomerge=0

LABEL reboot
  MENU LABEL Reboot
  COM32 reboot.c32

LABEL poweroff
  MENU LABEL Shutdown
  COM32 poweroff.c32
