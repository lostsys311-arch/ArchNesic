UI menu.c32

TIMEOUT 50
TOTALTIMEOUT 5000
DEFAULT amnesic-wipe

MENU TITLE Amnesic Wipe
MENU COLOR border 0 #cccccc #000000 none
MENU COLOR title 0 #f7768e #000000 bold
MENU COLOR sel 0 #ffffff #1a1b26 bold
MENU COLOR unsel 0 #c0caf5 #000000 none
MENU COLOR timeout_msg 0 #a9b1d6 #000000 none
MENU COLOR timeout 0 #e0af68 #000000 bold
MENU COLOR help 0 #565f89 #000000 none

LABEL amnesic-wipe
  MENU LABEL Amnesic Wipe — Secure Amnesic Linux
  LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
  INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-%ARCH%.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL% \
         toram quiet splash loglevel=3 \
         udev.log_priority=3 \
         systemd.show_status=auto \
         rd.systemd.show_status=auto \
         rd.udev.log_priority=3 \
         slab_nomerge init_on_alloc=1 init_on_free=1 \
         page_alloc.shuffle=1 randomize_kstack_offset=on \
         lockdown=confidentiality \
         spectre_v2=on spec_store_bypass_disable=on \
         tsx=off tsx_async_abort=full,nosmt \
         kvm.nx_huge_pages=force \
         module.sig_enforce=1 \
         mce=0

LABEL safe
  MENU LABEL Amnesic Wipe — Safe Mode
  LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
  INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-%ARCH%.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL% \
         quiet loglevel=3 \
         slab_nomerge init_on_alloc=1 init_on_free=1 \
         lockdown=confidentiality

LABEL memtest
  MENU LABEL MemTest86+
  LINUX ../%INSTALL_DIR%/boot/memtest86+/memtest.bin
