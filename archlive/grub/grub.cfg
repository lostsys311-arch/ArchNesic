set default="amnesic-wipe"
set timeout=5
set gfxmode=auto
set gfxpayload=keep

loadfont unicode
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod jpeg
insmod png

# Tokyo Night color scheme
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

menuentry "Amnesic Wipe — Secure Amnesic Linux" --class amnesic --class os {
  set_quiet_loglevels=3
  linux /%INSTALL_DIR%/boot/vmlinuz-linux \
        archisobasedir=%INSTALL_DIR% \
        archisolabel=%ISO_LABEL% \
        toram quiet splash loglevel=3 \
        udev.log_priority=3 \
        systemd.show_status=auto \
        rd.systemd.show_status=auto \
        rd.udev.log_priority=3 \
        mitigations=auto \
        slab_nomerge init_on_alloc=1 init_on_free=1 \
        page_alloc.shuffle=1 randomize_kstack_offset=on \
        lockdown=confidentiality \
        spectre_v2=on spec_store_bypass_disable=on \
        tsx=off tsx_async_abort=full,nosmt \
        kvm.nx_huge_pages=force \
        module.sig_enforce=1 \
        mce=0
  initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/initramfs-%ARCH%.img
}

menuentry "Amnesic Wipe — Safe Mode (no toram)" --class amnesic --class os {
  linux /%INSTALL_DIR%/boot/vmlinuz-linux \
        archisobasedir=%INSTALL_DIR% \
        archisolabel=%ISO_LABEL% \
        quiet loglevel=3 \
        mitigations=auto \
        slab_nomerge init_on_alloc=1 init_on_free=1 \
        lockdown=confidentiality \
        spectre_v2=on spec_store_bypass_disable=on \
        mce=0
  initrd /%INSTALL_DIR%/boot/intel-ucode.img /%INSTALL_DIR%/boot/amd-ucode.img /%INSTALL_DIR%/boot/initramfs-%ARCH%.img
}

menuentry "UEFI Firmware Settings" --class firmware {
  fwsetup
}
