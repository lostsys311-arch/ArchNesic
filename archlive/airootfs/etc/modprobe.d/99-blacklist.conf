# Amnesic Wipe — blacklist unused/unneeded kernel modules
# (reduces attack surface)

# No Bluetooth
blacklist bluetooth
blacklist btusb
blacklist btintel
blacklist btrtl
blacklist btmtk

# No NFC
blacklist nfc
blacklist pn533

# No webcams (unless you need them)
install uvcvideo /bin/true
install videodev /bin/true

# No FireWire
blacklist firewire-core
blacklist firewire-ohci
blacklist firewire-sbp2

# No IrDA
blacklist irda

# No PlayStation
blacklist ps3_gelic
blacklist ps3_lpm

# No Thunderbolt (DMA attacks)
blacklist thunderbolt
blacklist thunderbolt_net

# No legacy radio
blacklist radio_isa
blacklist radio_aztech
blacklist radio_aimslab
blacklist radio_typhoon
blacklist radio_terratec
blacklist radio_si470x
blacklist radio_shark
blacklist radio_shark2

# Disable AppleTalk
blacklist appletalk

# Disable OSS sound (legacy)
blacklist soundcore
blacklist snd
blacklist snd_pcm
blacklist snd_timer

# Disable agp (legacy)
blacklist agpgart
blacklist agp_amd64
blacklist intel_agp
blacklist nvidia_agp
