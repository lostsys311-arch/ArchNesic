# Amnesic Wipe — kernel hardening
# =================================

# Restrict kernel pointer access
kernel.kptr_restrict = 2

# Restrict dmesg to root only
kernel.dmesg_restrict = 1

# Restrict BPF to root
kernel.unprivileged_bpf_disabled = 1

# Disable BPF JIT (reduce attack surface)
net.core.bpf_jit_enable = 0

# ASLR
kernel.randomize_va_space = 2

# TCP syncookies
net.ipv4.tcp_syncookies = 1

# Disable IP forwarding
net.ipv4.conf.all.forwarding = 0
net.ipv6.conf.all.forwarding = 0

# Disable redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# Reverse-path filter
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.all.log_martians = 1

# Protect hard/symlinks
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Protect FIFO and regular files
fs.protected_fifos = 2
fs.protected_regular = 2

# Disable unprivileged user namespaces
kernel.unprivileged_userns_clone = 0

# Disable core dumps (no persistence anyway)
fs.suid_dumpable = 0

# Restrict perf events
kernel.perf_event_paranoid = 3

# Disable kexec (no reboots into modified kernels)
kernel.kexec_load_disabled = 1

# kernel lockdown (complementary to boot param)
kernel.lockdown = confidentiality

# Randomize page allocator
vm.page-cluster = 0
page_alloc.shuffle = 1
